<script>
// ═══ CONSTANTS & UTILS ═══════════════════════════════════════
const LS='lc_mkt_v5'; // vẫn dùng cho cloud URL config

// ═══ INDEXEDDB (lưu local không giới hạn dung lượng) ════════
const IDB_NAME='lc_mkt_hub', IDB_STORE='data', IDB_KEY='db';
function idbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbSave(data){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(data,IDB_KEY);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
async function idbLoad(){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(IDB_KEY);
    req.onsuccess=e=>res(e.target.result||null);
    req.onerror=e=>rej(e.target.error);
  });
}

// ═══ CLOUD SYNC (Google Apps Script backend) ════════════════
let CLOUD_URL=localStorage.getItem('lc_cloud_url')||'';
let _cloudSaving=false;
let _cloudAutoTimer=null;
let _lastCloudItemCount=-1; // -1 = chưa load từ cloud lần nào
let _blockAutoCloud=false;  // true sau khi xóa data → không auto-push

function _countDBItems(){
  return (DB.budgetCodes||[]).length+(DB.detailLines||[]).length+(DB.torrTrinh||[]).length;
}

async function saveToCloud(silent){
  if(!CLOUD_URL){if(!silent)openCloudSettings();return;}
  if(_cloudSaving)return;
  // Safeguard: nếu số item giảm >60% so với lần load cloud → không auto-push, cảnh báo
  if(silent&&_lastCloudItemCount>10){
    const cur=_countDBItems();
    if(cur<_lastCloudItemCount*0.4){
      showToast('⚠ Auto-cloud bị tạm dừng: data giảm bất thường ('+cur+' vs '+_lastCloudItemCount+' items). Nhấn "☁ Cloud Lưu" để xác nhận ghi đè.','err');
      return;
    }
  }
  _cloudSaving=true;
  if(!silent)showToast('☁ Đang lưu lên cloud...');
  try{
    const resp=await fetch(CLOUD_URL,{method:'POST',body:JSON.stringify({action:'save',data:DB}),headers:{'Content-Type':'text/plain'}});
    const result=await resp.json();
    if(result.ok){
      _lastCloudItemCount=_countDBItems();
      showToast(silent?'☁ Auto-saved cloud · '+new Date().toLocaleTimeString('vi-VN'):'☁ Đã lưu cloud · '+new Date().toLocaleTimeString('vi-VN'));
      updateSbInfo();
    } else showToast('❌ Cloud lỗi: '+(result.error||'unknown'),'err');
  }catch(e){if(!silent)showToast('❌ Không kết nối cloud: '+e.message,'err');}
  finally{_cloudSaving=false;}
}

function scheduleCloudSave(){_scheduleCloudAutoSave();} // alias giữ compat

function _showCloudProgress(msg){
  let el=document.getElementById('_cloudProgress');
  if(!el){el=document.createElement('div');el.id='_cloudProgress';
    Object.assign(el.style,{position:'fixed',bottom:'60px',right:'16px',background:'#1A237E',color:'#fff',padding:'8px 14px',borderRadius:'8px',fontSize:'12px',zIndex:'9999',display:'flex',alignItems:'center',gap:'8px'});
    document.body.appendChild(el);}
  el.innerHTML='<span style="display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></span>'+msg;
}
function _hideCloudProgress(){const el=document.getElementById('_cloudProgress');if(el)el.remove();}

async function loadFromCloud(silent){
  if(!CLOUD_URL){if(!silent)openCloudSettings();return;}
  if(!silent&&!confirm('Tải data từ cloud sẽ THAY THẾ data hiện tại.\nTiếp tục?'))return;
  const t0=Date.now();
  let ticker=null;
  _showCloudProgress('Đang kết nối cloud… 0s');
  ticker=setInterval(()=>{const s=Math.round((Date.now()-t0)/1000);_showCloudProgress('Đang tải cloud… '+s+'s');},500);
  try{
    const resp=await fetch(CLOUD_URL+'?action=load&t='+Date.now()); // cache-bust
    const result=await resp.json();
    clearInterval(ticker);_hideCloudProgress();
    if(result.data){
      const elapsed=((Date.now()-t0)/1000).toFixed(1);
      Object.assign(DB,result.data);
      _lastCloudItemCount=_countDBItems();
      _blockAutoCloud=false;
      invalidateCache();migrateDB();render(true);
      idbSave(JSON.stringify(DB)).catch(()=>{});
      showToast('☁ Cloud xong ('+elapsed+'s) · '+new Date().toLocaleTimeString('vi-VN'));
    } else if(!silent) showToast('❌ Cloud không có data','err');
  }catch(e){
    clearInterval(ticker);_hideCloudProgress();
    if(!silent)showToast('❌ Không tải được cloud: '+e.message,'err');
  }
}

// Gọi khi khởi động app — load cloud ngầm sau khi IDB đã hiển thị
async function bgLoadCloud(){
  if(!CLOUD_URL)return;
  await new Promise(r=>setTimeout(r,1500)); // đợi IDB render xong trước
  await loadFromCloud(true); // silent=true, không hỏi confirm, không báo lỗi
}
function openCloudSettings(){
  const isNew=!CLOUD_URL;
  openModal('<div class="modal-t">☁ Cài đặt Cloud (Google Apps Script)</div>'+
    (isNew?'<div class="ib ib-w" style="background:#FFF3E0;border-color:#FFCC80;color:#E65100;margin-bottom:10px">'+
      '⚠ <strong>Quan trọng:</strong> Sau khi lưu URL, hệ thống sẽ <strong>tải data từ cloud về</strong> trước — '+
      'không tự động đẩy data lên cloud. Tránh ghi đè data của người khác.'+
    '</div>':'<div class="ib ib-i" style="margin-bottom:10px">Cập nhật URL cloud. Sau khi lưu sẽ load lại data từ cloud.</div>')+
    '<div class="fg"><label class="fl">Apps Script Web App URL</label>'+
    '<input class="fi" id="cloud_url_inp" value="'+esc(CLOUD_URL)+'" placeholder="https://script.google.com/macros/s/AKfycb.../exec"></div>'+
    '<div class="ib ib-w" style="font-size:11px">URL lưu trong trình duyệt cá nhân. Mỗi người nhập 1 lần.</div>'+
    '<div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Hủy</button>'+
    '<button class="btn btn-p" onclick="saveCloudUrl()">💾 Lưu & Load cloud</button></div>');
}
function saveCloudUrl(){
  const url=document.getElementById('cloud_url_inp').value.trim();
  if(url&&!url.startsWith('https://script.google.com')){alert('URL không đúng định dạng Apps Script');return;}
  const isNew=url&&url!==CLOUD_URL;
  CLOUD_URL=url;
  localStorage.setItem('lc_cloud_url',url);
  if(isNew){
    // Block hoàn toàn auto-save cho đến khi load cloud xong
    _blockAutoCloud=true;
    clearTimeout(_cloudSaveTimer2);
    clearTimeout(_cloudAutoTimer);
    closeModal();
    showToast('☁ Đã lưu URL. Đang tải data từ cloud...');
    // Load cloud ngay — nếu thành công thì _blockAutoCloud=false được set trong loadFromCloud
    loadFromCloud(true); // silent=true, không hỏi confirm
  } else {
    closeModal();
    showToast(url?'☁ URL cloud đã cập nhật':'☁ Đã xóa URL cloud');
  }
  updateSbInfo();
}

const MAX_ROWS=300;

let _htmlCache={}; // {cacheKey: htmlString} — tránh re-render khi chỉ chuyển tab
let _dataVersion=0; // tăng mỗi khi data thay đổi → làm stale htmlCache
let _filterTimer=null;

let _idbTimer=null;
let _cloudSaveTimer2=null;

function invalidateCache(){
  _cache={periodKey:'',accruals:null,pending:null,unmatched:null,hangPending:null,period:{}};
  _htmlCache={};
  _dataVersion++;
}

function _scheduleIdbSave(){
  clearTimeout(_idbTimer);
  _idbTimer=setTimeout(()=>{
    idbSave(JSON.stringify(DB)).catch(()=>{});
  },800); // 800ms debounce — đủ nhanh, không chặn UI
}

function _scheduleCloudAutoSave(){
  if(!CLOUD_URL||_blockAutoCloud)return;
  clearTimeout(_cloudSaveTimer2);
  _cloudSaveTimer2=setTimeout(()=>saveToCloud(true),3000); // 3s sau thay đổi cuối
}
function getPeriodKey(){const{m,y}=getSelPeriod();return curPage+'|'+m+'|'+y;}
function cachePeriod(arr,m,y,result){
  const key=(arr===DB.budgetCodes?'bc':arr===DB.torrTrinh?'tt':arr===DB.detailLines?'dl':arr===DB.invoices?'inv':'x')+':'+m+':'+y;
  _cache.period[key]=result;
}
function getCachedPeriod(arr,m,y){
  const key=(arr===DB.budgetCodes?'bc':arr===DB.torrTrinh?'tt':arr===DB.detailLines?'dl':arr===DB.invoices?'inv':'x')+':'+m+':'+y;
  return _cache.period[key];
}
function limitRows(htmlRows,count,limit=MAX_ROWS){
  if(count<=limit)return htmlRows;
  const rows=htmlRows.split('</tr>');
  const kept=rows.slice(0,limit).join('</tr>')+(limit>0?'</tr>':'');
  return kept+'<tr><td colspan="20" style="text-align:center;padding:12px;color:#888;font-size:11px">... và '+(count-limit)+' dòng nữa (dùng filter để thu hẹp) ...</td></tr>';
}
function scheduleRender(force){
  if(_renderScheduled)return;
  _renderScheduled=true;
  requestAnimationFrame(()=>{_renderScheduled=false;render(force);});
}

function downloadCFTemplate(type){
  const headers=_cfHeaders(type);
  const sample=_cfSample(type);
  const ws=XLSX.utils.aoa_to_sheet([headers,...sample]);
  // style header row
  ws['!cols']=headers.map((_,i)=>({wch:[40,12,22,30,20,25][i]||20}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,type==='accrual'?'TrichTruoc':'TorrTrinhHang');
  XLSX.writeFile(wb,'Template_SoDu_'+(type==='accrual'?'TrichTruoc':'TorrTrinhHang')+'.xlsx');
}

let _cfRows=[];
function previewCFFile(input,type){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const all=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // bỏ dòng tiêu đề (dòng đầu nếu có chữ)
    const firstDataIdx=all[0]&&isNaN(parseFloat(all[0][2]))?1:0;
    _cfRows=all.slice(firstDataIdx).filter(r=>r[0]&&r[2]);
    if(!_cfRows.length){
      document.getElementById('cf_preview').style.display='block';
      document.getElementById('cf_preview_table').innerHTML='<span style="color:var(--red)">⚠ Không đọc được dữ liệu. Kiểm tra lại file template.</span>';
      return;
    }

    const tableHtml='<table style="width:100%;border-collapse:collapse">'+
      '<thead><tr>'+headers.map(h=>'<th style="background:#E8EAF6;padding:4px 8px;text-align:left;white-space:nowrap">'+h.replace(' *','')+'</th>').join('')+'</tr></thead>'+
      '<tbody>'+_cfRows.map((r,i)=>
        '<tr style="background:'+(i%2?'#FAFAFA':'#FFF')+'">'
        +headers.map((_,ci)=>'<td style="padding:3px 8px;border-bottom:1px solid #F0F0F0">'+esc(String(r[ci]||''))+'</td>').join('')+
        '</tr>'

  };

function _parseDate(s){
  if(!s)return '';
  s=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
  if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  // Excel serial date number
  if(/^\d+$/.test(s)){const d=XLSX.SSF.parse_date_code(+s);if(d)return d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0');}
  return '';
}
function _parseAmt(s){const v=parseFloat(String(s).replace(/[^\d.-]/g,''));return isNaN(v)?0:v;}

function doCarryForwardImport(type){
  if(!_cfRows.length){alert('Chưa có dữ liệu. Upload file trước.');return;}
  const{y}=getSelPeriod();
  let imported=0,skipped=0;

  if(type==='accrual'){
    _cfRows.forEach((r,i)=>{
      const chuongTrinh=String(r[0]||'').trim();
      const nhaCungCap=String(r[1]||'').trim();   // cột 2: NCC
      const mo=parseInt(r[2])||1;                  // cột 3: tháng
      const chiPhi=_parseAmt(r[3]);               // cột 4: số tiền TT
      if(!chiPhi){skipped++;return;}
      const revAmt=_parseAmt(r[4]||0);            // cột 5: đã HN
      const accrualDate=_parseDate(r[5]||'');     // cột 6: ngày trích
      const note=String(r[6]||'').trim();          // cột 7: ghi chú
      const isFull=revAmt>=chiPhi*0.99;
      DB.detailLines.push({
        id:'CF-ACC-'+Date.now()+'-'+i,bcId:null,ttId:null,pic:'',maShop:'',
        chiPhi,chuongTrinh,nhaCungCap,trichTruoc:'N',soHoaDon:'',kyHieu:'',
        maSoThueNCC:'',tenShop:'',nhom:'',
        importMonth:mo,importYear:+y,
        matchedInvoice:'',matchAmountOk:false,
        accrualDate,reversalDate:isFull?TODAY:'',
        reversalInvNo:'',reversalAmount:revAmt,
        reversalStatus:isFull?'full':revAmt>0?'partial':'',
        reversalPayments:[],
        reversalNote:note,carryForward:true
      });
      imported++;
    });
  } else {
    _cfRows.forEach((r,i)=>{
      const desc=String(r[0]||'').trim();
      const mo=parseInt(r[1])||1;
      const contractAmt=_parseAmt(r[2]);
      if(!contractAmt){skipped++;return;}
      const statusRaw=String(r[3]||'').toLowerCase().trim();
      const arStatus=['pending','invoiced','collected'].includes(statusRaw)?statusRaw:'pending';
      const invNo=String(r[4]||'').trim();
      const note=String(r[5]||'').trim();
      const bcId='CF-HANG-'+Date.now()+'-'+i;
      DB.budgetCodes.push({
        id:bcId,ttId:null,budgetCode:'CF-T'+String(mo).padStart(2,'0'),
        description:desc,category:'HANG',bu:'NT',
        month:mo,year:+y,
        budgetAmount:contractAmt,usedAmount:contractAmt,
        transferredIn:0,transferredOut:0,carryForward:true
      });
      DB.hangTracking.push({
        id:'CFH-'+Date.now()+'-'+i,bcId,arStatus,contractAmt,
        invoiceNo:invNo,receivedDate:'',
        arCollectedAmt:arStatus==='collected'?contractAmt:0,
        notes:'Số dư đầu kỳ T'+mo+(note?' · '+note:''),carryForward:true
      });
      imported++;
    });
  }
  _cfRows=[];
  invalidateCache();closeModal();
  showToast('✅ Import xong: '+imported+' khoản'+(skipped?' (bỏ qua '+skipped+' dòng thiếu data)':''));
  render(true);
}

  // HTML cache: chỉ build lại khi data thay đổi (_dataVersion) hoặc period/page thay đổi
  const cacheKey=curPage+'|'+m+'|'+y+'|'+_dataVersion;
  if(!force&&_htmlCache[cacheKey]){
    // Chỉ cần gắn DOM, không gọi render fn → nhanh hơn nhiều khi chuyển tab
    document.getElementById('content').innerHTML=_htmlCache[cacheKey];

}

// ═══ PAGE: TỜ TRÌNH HÃNG ══════════════════════════════════
function renderHang(m, y) {
  const selMo = hangFilter.selectedMonths;
  const allowedMonths = resolveMonthFilter(selMo, +m); // null = all, array = specific
  const hangMonthOk = mo => allowedMonths === null || allowedMonths.includes(mo);
  let hangBCs = DB.budgetCodes.filter(b => b.category === 'HANG' && b.year === y && hangMonthOk(b.month));
  let hts = DB.hangTracking.filter(h => { const bc = DB.budgetCodes.find(b => b.id === h.bcId); return bc && bc.year === y && hangMonthOk(bc.month); });
  const totalCP = hangBCs.reduce((s, b) => s + b.usedAmount, 0);
  const totalInv = hts.filter(h => h.arStatus === 'invoiced' || h.arStatus === 'collected').reduce((s, h) => s + h.contractAmt, 0);
  const totalCol = hts.filter(h => h.arStatus === 'collected').reduce((s, h) => s + h.arCollectedAmt, 0);
  // BCs không có tracking record mặc định là 'pending'
  const trackedBcIds = new Set(hts.map(h => h.bcId));
  const untrackedBCs = hangBCs.filter(b => !trackedBcIds.has(b.id));
  const getStatus = bc => { const ht = hts.find(h => h.bcId === bc.id); return ht?.arStatus || 'pending'; };
  const sumCards = Object.entries(HANG_INV_STATUS).filter(([k]) => k !== 'na').map(([k, v]) => {
    const bcsOfStatus = hangBCs.filter(b => getStatus(b) === k);
    const cnt = bcsOfStatus.length;
    const amt = bcsOfStatus.reduce((s, b) => { const ht = hts.find(h => h.bcId === b.id); return s + (ht?.contractAmt || b.usedAmount); }, 0);
    const bg = { pending: '#FFF8E1', invoiced: '#E3F2FD', collected: '#E8F5E9' }[k] || '#F5F5F5';
    return '<div style="background:' + bg + ';border-radius:7px;padding:9px 13px;border:.5px solid #E0E0E0"><div class="kpi-l">' + v + '</div><div style="font-size:16px;font-weight:700">' + cnt + ' khoản</div><div class="kpi-s">' + FMT(amt) + '</div></div>';
  }).join('');
  const rows = hangBCs.map(bc => {
    const tt = DB.torrTrinh.find(t => t.id === bc.ttId) || {};
    const ht = hts.find(h => h.bcId === bc.id);
    const cap70 = bc.budgetAmount;
    const funding100 = cap70 / 0.7;
    const saving30 = funding100 - cap70;
    const overCap = bc.usedAmount > cap70 + 1;
    const arBadge = { pending: '<span class="b by">⏳ Chờ AR</span>', invoiced: '<span class="b bb">📄 Đã xuất HĐ</span>', collected: '<span class="b bg">✅ Đã thu tiền</span>', na: '<span class="b bgr">N/A</span>' }[ht?.arStatus || 'pending'] || '<span class="b by">⏳ Chờ AR</span>';
    return '<tr' + (overCap ? ' style="background:#FDECEA"' : '') + '><td style="padding-left:15px"><span class="code">' + bc.budgetCode + '</span></td>' +
      '<td class="f12">' + bc.description.substring(0, 32) + '</td>' +
      '<td><span class="b ' + (bc.bu === 'NT' ? 'bor' : 'bpu') + '">' + bc.bu + '</span></td>' +
      '<td class="tr f11 cm">' + FMT(funding100) + '</td>' +
      '<td class="tr fw6">' + FMT(cap70) + '</td>' +
      '<td class="tr f11" style="color:#1E7E34">' + FMT(saving30) + '</td>' +
      '<td class="tr fw6"' + (overCap ? ' style="color:#B3261E"' : '') + '>' + FMT(bc.usedAmount) + (overCap ? ' ⚠' : '') + '</td>' +
      '<td>' + arBadge + '</td>' +
      '<td class="f11">' + (ht?.arInvNo ? '<span class="code">' + ht.arInvNo + '</span>' : '—') + '</td>' +
      '<td class="f11 cm">' + (ht?.arInvDate || '—') + '</td>' +
      '<td class="tr">' + (ht?.arCollectedAmt > 0 ? '<span class="gr fw6">' + FMT(ht.arCollectedAmt) + '</span>' : '—') + '</td>' +
      '<td><div style="display:flex;gap:4px">' +
      '<button class="btn btn-s btn-sm" onclick="editHangTracking(\'' + bc.id + '\')">✏</button>' +
      (!ht ? '<button class="btn btn-p btn-sm" onclick="addHangTracking(\'' + bc.id + '\')">+ TD</button>' : '') +
      '</div></td></tr>';
  }).join('');
  const moPicker = buildMonthPicker(selMo, m, 'function(v){hangFilter.selectedMonths=toggleMonthSel(hangFilter.selectedMonths,v);render(true);}');
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px">' +
    '<h3 style="font-size:14px;font-weight:700;color:#1A1D2E">Tờ trình Hãng T' + MM(m) + '/' + y + '</h3>' +
    '<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">' +
    moPicker +
    '<button class="btn btn-p" onclick="addHangTrackingManual()">+ Thêm theo dõi</button>'+
    '<button class="btn btn-sm" style="background:#FFF3E0;color:#E65100;border:1px solid #FFCC80" onclick="openCarryForwardImport(\'hang\')">📥 Import số dư T1-5</button>'+
    '</div></div>' +
    '<div class="ib ib-o">Quy tắc tài trợ: Hãng tài trợ <strong>100đ</strong> → công ty được dùng <strong>70đ</strong> (Cap), tiết kiệm <strong>30đ</strong>. Dòng đỏ ⚠ = đã chi vượt mức 70%. AR cần xác nhận đã xuất HĐ thu tiền lại hãng chưa (theo dõi tiếp qua các tháng tới khi thu xong).</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">' + sumCards + '</div>' +
    '<div class="g3" style="margin-bottom:10px">' +
    '<div style="background:#fff;border-radius:7px;padding:9px 13px;border:.5px solid #E2E2E2"><div class="kpi-l">Tổng chi phí hãng (Used)</div><div style="font-size:16px;font-weight:700;color:var(--or)">' + FMT(totalCP) + '</div></div>' +
    '<div style="background:#fff;border-radius:7px;padding:9px 13px;border:.5px solid #E2E2E2"><div class="kpi-l">Đã xuất HĐ AR</div><div style="font-size:16px;font-weight:700;color:var(--bl)">' + FMT(totalInv) + '</div></div>' +
    '<div style="background:#fff;border-radius:7px;padding:9px 13px;border:.5px solid #E2E2E2"><div class="kpi-l">Đã thu tiền</div><div style="font-size:16px;font-weight:700;color:var(--green)">' + FMT(totalCol) + '</div></div>' +
    '</div>' +
    '<div class="card"><div class="ch"><span class="ct">Chi tiết Tờ trình Hãng (' + hangBCs.length + ')</span></div>' +
    '<div class="cb" style="padding:0"><table><thead><tr>' +
    '<th style="padding-left:15px">Budget Code</th><th>Hãng/Mô tả</th><th>BU</th>' +
    '<th class="tr">Funding 100%</th><th class="tr">Cap 70%</th><th class="tr">Saving 30%</th>' +
    '<th class="tr">Đã dùng</th><th>AR Status</th><th>Số HĐ AR</th><th>Ngày xuất</th><th class="tr">Đã thu</th><th>Action</th>' +
    '</tr></thead><tbody>' + (rows || '<tr><td colspan="12" style="text-align:center;padding:20px;color:#888">Không có tờ trình hãng trong kỳ này</td></tr>') + '</tbody></table></div></div>';
}

// ─── Month picker helper ─────────────────────────────────
// sm: '' = sidebar month (default), 'all' = all months, '1,3,5' = specific months
function buildMonthPicker(sm, sidebarM, onChangeFn) {
  const isAll = sm === 'all';
  const selected = (!sm || sm === '' || isAll) ? new Set() : new Set(sm.split(',').filter(Boolean));
  const noneSelected = !isAll && selected.size === 0;
  const btnAll = '<button class="mo-btn all-btn'+(isAll?' active':'')+'" onclick="('+onChangeFn+')('+( isAll?"''":"'all'")+')">Tất cả</button>';
  const monthBtns = Array.from({length:12},(_,i)=>{
    const mo=i+1, moStr=String(mo), on=!isAll&&selected.has(moStr), isCur=mo===sidebarM&&noneSelected;
    return '<button class="mo-btn'+(on?' active':'')+'"'+(isCur?' style="border-color:var(--or);color:var(--or)"':'')+' onclick="('+onChangeFn+")('"+moStr+"')"+'" title="T'+MM(mo)+(isCur?' – tháng hiện tại':'')+'">T'+MM(mo)+(isCur?'●':'')+'</button>';
  }).join('');
  return '<div class="mo-picker">'+btnAll+monthBtns+'</div>';
}
function toggleMonthSel(current, val) {
  if(val==='all') return current==='all'?'':'all';
  if(current==='all') return val;
  const parts=(!current||current==='')?[]:current.split(',').filter(Boolean);
  const idx=parts.indexOf(val);
  if(idx>-1) parts.splice(idx,1); else parts.push(val);
  return parts.join(',');
}
function resolveMonthFilter(sm, sidebarM) {
  if(!sm||sm==='') return [sidebarM];
  if(sm==='all') return null; // null = no month filter
  return sm.split(',').map(Number).filter(n=>!isNaN(n)&&n>0);
}

// ═══ PAGE: TRÍCH TRƯỚC ════════════════════════════════════
function ttShortLabel(ttId){
  const tt=DB.torrTrinh.find(t=>t.id===ttId);
  if(!tt)return'??';
  const map={'1-NT':'TONG','2-VX':'VX','3-NT-HANG':'HANG-NT','4-VX-HANG':'HANG-VX','ADHOC':'ADHOC'};
  return map[tt.type]||tt.type||'TT';
}
function groupAccruals(lines){
  const map={};
  lines.forEach(d=>{
    const key=(d.bcId||'')+'||'+norm(d.chuongTrinh).substring(0,40);
    if(!map[key]){
      const bc=DB.budgetCodes.find(b=>b.id===d.bcId);
      const mm=String(bc?.month||d.importMonth||'??').padStart(2,'0');
      const bu=bc?.bu||d.bu||'??';
      const ttLabel=ttShortLabel(d.ttId).toLowerCase();
      const ttObj=DB.torrTrinh.find(t=>t.id===d.ttId);
      const picSrc=ttObj?.pic||bc?.pic||d.pic||'';
      const picClean=norm(picSrc).replace(/\s+/g,'')||'nopic';
      const sttStr=(d.hangMucTT&&d.hangMucTT.length)?('STT'+d.hangMucTT.join('_')):'STT';
      const gid=[mm,bu,ttLabel,picClean,sttStr].join('-');
      map[key]={
        groupId:gid,ids:[d.id],bcId:d.bcId,ttId:d.ttId,chuongTrinh:d.chuongTrinh,maSoThueNCC:d.maSoThueNCC,nhaCungCap:d.nhaCungCap,hangMucTT:d.hangMucTT,maShop:d.maShop,
        totalChiPhi:d.chiPhi,reversalAmount:(d.reversalAmount||0),accrualDate:d.accrualDate,trichTruoc:d.trichTruoc,reversalDate:d.reversalDate,reversalInvNo:d.reversalInvNo,
        reversalPayments:d.reversalPayments?[...d.reversalPayments]:[],reversalStatus:d.reversalStatus||'',count:1
      };
    }else{
      map[key].ids.push(d.id);map[key].totalChiPhi+=d.chiPhi;map[key].reversalAmount+=(d.reversalAmount||0);map[key].count++;
      if(d.accrualDate&&(!map[key].accrualDate||d.accrualDate<map[key].accrualDate))map[key].accrualDate=d.accrualDate;
      if(d.reversalStatus==='partial')map[key].reversalStatus='partial';
      // Merge payment history: deduplicate by HĐ number
      if(d.reversalPayments){d.reversalPayments.forEach(p=>{if(!map[key].reversalPayments.find(x=>x.no===p.no))map[key].reversalPayments.push(p);});}
    }
  });
  return Object.values(map);
}

function renderAccrual(m,y){
  const _accMo=resolveMonthFilter(accrualFilter.selectedMonths,+m);
  const periodBCs=DB.budgetCodes.filter(b=>b.year===+y&&b.category!=='HANG'&&(_accMo===null||_accMo.includes(b.month)));
  const selectedTTs=accrualFilter.ttIds;
  const hasTTFilter=selectedTTs.size>0;
  const passFilter=d=>{
    if(hasTTFilter){
      const bc=periodBCs.find(b=>b.id===d.bcId);
      if(!selectedTTs.has(d.ttId)&&!(bc&&selectedTTs.has(bc.ttId)))return false;
    }
    if(accrualFilter.bcId&&d.bcId!==accrualFilter.bcId)return false;
    if(accrualFilter.vendor&&!(norm(d.nhaCungCap||d.maSoThueNCC||'').includes(norm(accrualFilter.vendor))))return false;
    if(accrualFilter.q){
      const q=norm(accrualFilter.q);
      const bc=DB.budgetCodes.find(b=>b.id===d.bcId);
      if(![bc?.budgetCode||'',d.chuongTrinh,d.nhaCungCap,d.maSoThueNCC,d.maShop||''].some(v=>v&&norm(String(v)).includes(q)))return false;
    }
    return true;
  };
  // Month filter using resolveMonthFilter for correct multi-month + 'all' handling
  const monthFilter=d=>_accMo===null||_accMo.includes(d.importMonth);
  // Exclude HANG TT from accrual tab
  const isHangTT=ttId=>{
    const tt=DB.torrTrinh.find(t=>t.id===ttId);
    return tt&&(tt.type==='3-NT-HANG'||tt.type==='4-VX-HANG');
  };
  const pendingRaw=DB.detailLines.filter(d=>{
    if(d.trichTruoc!=='N')return false;
    // partial đã hoàn nhập 1 phần vẫn nằm trong pending
    if(d.reversalDate&&d.reversalStatus!=='partial')return false;
    if(d.importYear!==y)return false;
    if(isHangTT(d.ttId))return false;
    if(!monthFilter(d))return false;
    return passFilter(d);
  });
  const reversedRaw=DB.detailLines.filter(d=>{
    if(d.trichTruoc!=='N'||!d.reversalDate||d.reversalStatus==='partial')return false;
    if(d.importYear!==y)return false;
    if(isHangTT(d.ttId))return false;
    if(!monthFilter(d))return false;
    return passFilter(d);
  });
  const _dlToGrp=d=>({groupId:'',ids:[d.id],bcId:d.bcId,ttId:d.ttId,chuongTrinh:d.chuongTrinh,maSoThueNCC:d.maSoThueNCC,nhaCungCap:d.nhaCungCap,hangMucTT:d.hangMucTT,maShop:d.maShop,totalChiPhi:d.chiPhi,reversalAmount:(d.reversalAmount||0),accrualDate:d.accrualDate,trichTruoc:d.trichTruoc,reversalDate:d.reversalDate,reversalInvNo:d.reversalInvNo,reversalPayments:d.reversalPayments||[],reversalStatus:d.reversalStatus||'',count:1});
  const pending=accrualFilter.groupMode?groupAccruals(pendingRaw):pendingRaw.map(_dlToGrp);
  const reversed=accrualFilter.groupMode?groupAccruals(reversedRaw):reversedRaw.map(_dlToGrp);
  const accrualTTs=DB.torrTrinh.filter(t=>t.year===+y&&(_accMo===null||_accMo.includes(t.month))&&t.type!=='3-NT-HANG'&&t.type!=='4-VX-HANG');

  const now=new Date();
  const calcDays=g=>g.accrualDate?Math.floor((now-new Date(g.accrualDate))/864e5):0;
  const filteredPending=pending.filter(g=>{
    const days=calcDays(g);
    if(accrualFilter.minDays!==''&&days<+accrualFilter.minDays)return false;
    if(accrualFilter.maxDays!==''&&days>+accrualFilter.maxDays)return false;
    return true;
  });
  const aging={a:[],b:[],c:[],d:[]};
  filteredPending.forEach(g=>{
    const days=calcDays(g);
    if(days>60)aging.d.push(g);else if(days>45)aging.c.push(g);else if(days>30)aging.b.push(g);else aging.a.push(g);
  });

  const rowsArr=[];

    if(hasDetail){
      const detailBody=g.ids.map(id=>{

  const rows=limitRows(rowsArr.join(''),filteredPending.length);

  const revRows=reversed.map(g=>{

function renderTransfer(m,y){
  const curBCs=filterByPeriod(DB.budgetCodes,m,y);

  const priorBCs=DB.budgetCodes.filter(b=>(b.year<y)||(b.year===y&&b.month<m)).filter(b=>b.category!=='HANG');
  priorBCs.sort((a,b)=>(b.year-a.year)||(b.month-a.month)||(a.sttTT||0)-(b.sttTT||0));

    if(remaining<=0)return '';

function renderMonthly(m,y){
  const bcs=filterByPeriod(DB.budgetCodes,m,y),tts=filterByPeriod(DB.torrTrinh,m,y);
  const dls=DB.detailLines.filter(d=>d.importMonth===+m&&d.importYear===y);
  const totalNS=bcs.reduce((s,b)=>s+b.budgetAmount+b.transferredIn,0),totalUsed=bcs.reduce((s,b)=>s+b.usedAmount,0);
  const totalAcc=dls.filter(d=>d.trichTruoc==='N'&&!d.reversalDate).reduce((s,d)=>s+d.chiPhi,0);
  const totalHD=dls.filter(d=>d.trichTruoc==='Y').reduce((s,d)=>s+d.chiPhi,0);
  const buRows=[['NT','Nhà thuốc LC'],['VX','Vaccine TTTC']].map(([bu,lbl])=>{
    const b=bcs.filter(x=>x.bu===bu);const ns=b.reduce((s,x)=>s+x.budgetAmount+x.transferredIn,0);const used=b.reduce((s,x)=>s+x.usedAmount,0);const p=ns>0?used/ns*100:0;
    return '<tr><td style="padding-left:15px"><span class="b '+(bu==='NT'?'bor':'bpu')+'">'+bu+'</span> '+lbl+'</td><td class="tr">'+FMT(ns)+'</td><td class="tr">'+FMT(used)+'</td><td class="tr" style="color:'+(ns-used<0?'var(--red)':'var(--green)')+'">'+FMT(ns-used)+'</td><td class="tc fw6">'+Math.round(p)+'%</td><td><div class="prog"><div class="prog-f" style="width:'+Math.min(p,100)+'%;background:'+(p>100?'#E53935':'var(--or)')+'"></div></div></td></tr>';
  }).join('');
  const catRows=Object.entries(CAT_LABEL).map(([cat,lbl])=>{
    const b=bcs.filter(x=>x.category===cat);if(!b.length)return'';
    const ns=b.reduce((s,x)=>s+x.budgetAmount+x.transferredIn,0),used=b.reduce((s,x)=>s+x.usedAmount,0),p=ns>0?used/ns*100:0;
    return '<tr><td style="padding-left:15px"><span style="color:'+CAT_COLOR[cat]+';font-weight:700">['+cat+']</span> '+lbl+'</td><td class="tc">'+b.length+'</td><td class="tr">'+FMT(ns)+'</td><td class="tr '+(p>100?'over':'')+'">'+FMT(used)+'</td><td class="tr" style="color:'+(ns-used<0?'var(--red)':'var(--green)')+'">'+FMT(ns-used)+'</td><td class="tc fw6 '+(p>100?'re':p>85?'or':'')+'">'+Math.round(p)+'%</td><td><div class="prog"><div class="prog-f" style="width:'+Math.min(p,100)+'%;background:'+(p>100?'#E53935':p>85?'#FFA000':CAT_COLOR[cat])+'"></div></div></td></tr>';
  }).join('');

    '<h3 style="font-size:14px;font-weight:700;color:#1A1D2E">Báo cáo Tháng '+MM(m)+'/'+y+'</h3>'+
    '<button class="btn btn-s" onclick="exportMonthlyExcel('+m+','+y+')">📥 Export Excel</button></div>'+
    '<div class="kpi-row">'+
    '<div class="kpi" style="border-top-color:var(--or)"><div class="kpi-l">Tổng NS</div><div class="kpi-v or">'+FMT(totalNS)+'</div><div class="kpi-s">'+bcs.length+' codes · '+tts.length+' TT</div></div>'+

    '<div class="kpi" style="border-top-color:#43A047"><div class="kpi-l">Có HĐ đầy đủ</div><div class="kpi-v gr">'+FMT(totalHD)+'</div></div>'+
    '<div class="kpi" style="border-top-color:#FFA000"><div class="kpi-l">Trích trước tồn</div><div class="kpi-v" style="color:var(--yellow)">'+FMT(totalAcc)+'</div></div>'+

    '<h3 style="font-size:14px;font-weight:700;color:#1A1D2E">Báo cáo Quý / Năm '+y+'</h3>'+

// ═══ ACTIONS: DELETE ════════════════════════════════════
function deleteTT(ttId){
  const tt=DB.torrTrinh.find(t=>t.id===ttId);if(!tt)return;
  const cnt=DB.budgetCodes.filter(b=>b.ttId===ttId).length;
  if(!confirm('Xóa tờ trình "'+tt.ttCode+'"?\nSẽ xóa '+cnt+' budget code liên quan.\nKhông thể hoàn tác!'))return;
  DB.budgetCodes=DB.budgetCodes.filter(b=>b.ttId!==ttId);
  DB.torrTrinh=DB.torrTrinh.filter(t=>t.id!==ttId);
  invalidateCache();showToast('✅ Đã xóa TT '+tt.ttCode);render(true);
}
function deleteBC(bcId){
  const bc=DB.budgetCodes.find(b=>b.id===bcId);if(!bc)return;
  if(!confirm('Xóa budget code "'+bc.budgetCode+'"?\nKhông thể hoàn tác!'))return;
  DB.detailLines.forEach(d=>{if(d.bcId===bcId)d.bcId='';});
  DB.budgetCodes=DB.budgetCodes.filter(b=>b.id!==bcId);
  invalidateCache();showToast('✅ Đã xóa BC '+bc.budgetCode);render(true);
}
function deleteDL(dlId){
  const dl=DB.detailLines.find(d=>d.id===dlId);if(!dl)return;
  if(!confirm('Xóa dòng '+dlId+'?\n'+dl.chuongTrinh.substring(0,50)+'\n'+FMT2(dl.chiPhi)))return;
  if(dl.matchedInvoice){const inv=DB.invoices.find(i=>i.id===dl.matchedInvoice);if(inv){inv.matched=false;inv.matchedDLId='';inv.amountDiff=0;}}
  DB.detailLines=DB.detailLines.filter(d=>d.id!==dlId);
  invalidateCache();showToast('✅ Đã xóa '+dlId);render(true);
}
function deleteInv(invId){
  const inv=DB.invoices.find(i=>i.id===invId);if(!inv)return;
  if(!confirm('Xóa HĐ '+inv.soHoaDon+'?\n'+FMT2(inv.tongTien)))return;
  if(inv.matchedDLId){const dl=DB.detailLines.find(d=>d.id===inv.matchedDLId);if(dl){dl.matchedInvoice='';dl.matchAmountOk=false;}}
  DB.invoices=DB.invoices.filter(i=>i.id!==invId);
  invalidateCache();showToast('✅ Đã xóa HĐ '+inv.soHoaDon);render(true);
}
function clearPeriodData(m,y){
  const tts=filterByPeriod(DB.torrTrinh,m,y);
  const bcs=filterByPeriod(DB.budgetCodes,m,y);
  const bcIds=bcs.map(b=>b.id);
  const dlCount=DB.detailLines.filter(d=>bcIds.includes(d.bcId)).length;
  if(!confirm('XÓA TẤT CẢ dữ liệu T'+MM(m)+'/'+y+'?\n\n'+tts.length+' TT · '+bcs.length+' BC · '+dlCount+' detail\n\nKHÔNG THỂ HOÀN TÁC!'))return;
  const ttIds=tts.map(t=>t.id);
  DB.detailLines.forEach(d=>{if(bcIds.includes(d.bcId)){if(d.matchedInvoice){const inv=DB.invoices.find(i=>i.id===d.matchedInvoice);if(inv){inv.matched=false;inv.matchedDLId='';inv.amountDiff=0;}}}});
  DB.detailLines=DB.detailLines.filter(d=>!bcIds.includes(d.bcId));
  DB.torrTrinh=DB.torrTrinh.filter(t=>!ttIds.includes(t.id));

// ═══ ACTIONS: INVOICE MATCH + AMOUNT ════════════════════
function autoMatchAll(){
  let cnt=0;
  // Chuẩn hóa MST và Số HĐ khi so sánh
  const cleanMST=v=>String(v||'').replace(/[.\s\-]/g,'').trim();
  const cleanSHD=v=>String(v||'').trim();
  DB.invoices.forEach(inv=>{
    if(inv.matched)return;
    const invMST=cleanMST(inv.maSoThue),invSHD=cleanSHD(inv.soHoaDon);
    const dl=DB.detailLines.find(d=>{
      if(d.matchedInvoice)return false;
      const dlMST=cleanMST(d.maSoThueNCC),dlSHD=cleanSHD(d.soHoaDon);
      return dlMST && dlMST===invMST && dlSHD && dlSHD===invSHD;
    });
    if(dl){
      inv.matched=true;inv.matchedDLId=dl.id;
      const invAmt=inv.truocThue>0?inv.truocThue:inv.tongTien;
      inv.amountDiff=invAmt-dl.chiPhi;
      dl.matchedInvoice=inv.id;
      dl.matchAmountOk=Math.abs(inv.amountDiff)<=1000;
      if(dl.trichTruoc==='N'&&!dl.reversalDate&&dl.matchAmountOk){
        dl.reversalDate=TODAY;dl.reversalInvNo=inv.soHoaDon;
      }
      cnt++;
    }
  });
  invalidateCache();render(true);showToast('⚡ Auto-match: '+cnt+' HĐ khớp!');
}
function manualMatchInv(invId){
  const cleanMST=v=>String(v||'').replace(/[.\s\-]/g,'').trim();
  const cleanSHD=v=>String(v||'').trim();
  const inv=DB.invoices.find(i=>i.id===invId);if(!inv)return;
  const invAmt=inv.truocThue>0?inv.truocThue:inv.tongTien;
  const invMST=cleanMST(inv.maSoThue),invSHD=cleanSHD(inv.soHoaDon);
  const cands=DB.detailLines.filter(d=>!d.matchedInvoice&&(cleanMST(d.maSoThueNCC)===invMST||cleanSHD(d.soHoaDon)===invSHD));
  const rows=cands.map(d=>{
    const diff=invAmt-d.chiPhi;const big=Math.abs(diff)>1000;
    return '<div class="cb-row"><input type="radio" name="mDL" value="'+d.id+'" id="r_'+d.id+'">'+
      '<label for="r_'+d.id+'" style="flex:1;cursor:pointer"><span class="code">'+d.id+'</span> '+d.chuongTrinh.substring(0,40)+
      '<br><span class="f11 cm">CP: '+FMT2(d.chiPhi)+' · '+( d.soHoaDon||'—')+' · '+(d.maSoThueNCC||'—')+'</span></label>'+
      '<span style="font-size:11px;font-weight:600;color:'+(big?'var(--red)':'var(--green)')+'">'+ (big?(diff>0?'+':'')+FMT(diff)+' lệch':'✓ Khớp tiền')+'</span></div>';
  }).join('')||'<div class="f11 cm" style="padding:10px 0">Không tìm thấy dòng phù hợp (cùng MST hoặc Số HĐ)</div>';
  openModal('<div class="modal-t">🔗 Khớp thủ công</div>'+
    '<div class="ib ib-i">HĐ: <strong>'+inv.soHoaDon+'</strong> · '+inv.tenNCC.substring(0,30)+
    '<br>Trước thuế: <strong>'+FMT2(inv.truocThue)+'</strong> · Tổng TT: '+FMT2(inv.tongTien)+'</div>'+
    '<div class="fg"><label class="fl">Chọn dòng detail (so sánh theo Tiền trước thuế vs CP Detail)</label>'+
    '<div style="max-height:240px;overflow-y:auto;border:1px solid #E0E0E0;border-radius:6px;padding:8px">'+rows+'</div></div>'+
    '<div class="ib ib-w" style="margin-top:8px">Nếu lệch tiền, hệ thống vẫn cho khớp nhưng cần xác nhận thêm.</div>'+
    '<div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Hủy</button>'+
    '<button class="btn btn-p" onclick="doManualMatch(\''+invId+'\')">✅ Xác nhận</button></div>');
}
function doManualMatch(invId){
  const sel=document.querySelector('input[name="mDL"]:checked');
  if(!sel){alert('Vui lòng chọn dòng detail');return;}
  const inv=DB.invoices.find(i=>i.id===invId);const dl=DB.detailLines.find(d=>d.id===sel.value);
  if(inv&&dl){
    const invAmt=inv.truocThue>0?inv.truocThue:inv.tongTien;
    inv.matched=true;inv.matchedDLId=dl.id;inv.amountDiff=invAmt-dl.chiPhi;
    dl.matchedInvoice=invId;dl.matchAmountOk=Math.abs(inv.amountDiff)<=1000;
    if(dl.trichTruoc==='N'&&!dl.reversalDate&&dl.matchAmountOk){dl.reversalDate=TODAY;dl.reversalInvNo=inv.soHoaDon;}
    invalidateCache();closeModal();showToast('✅ Đã khớp'+(Math.abs(inv.amountDiff)>1000?' – ⚠ Lệch '+FMT(inv.amountDiff):''));render(true);
  }

function confirmAmountMatch(invId){
  const inv=DB.invoices.find(i=>i.id===invId);if(!inv)return;
  const invAmt=inv.truocThue>0?inv.truocThue:inv.tongTien;
  const dl=inv.matchedDLId?DB.detailLines.find(d=>d.id===inv.matchedDLId):null;
  if(!confirm('Xác nhận chấp nhận lệch?\nHĐ (trước thuế): '+FMT2(invAmt)+'\nDetail: '+(dl?FMT2(dl.chiPhi):'?')+'\nLệch: '+FMT2(inv.amountDiff)))return;
  if(dl){dl.matchAmountOk=true;if(dl.trichTruoc==='N'&&!dl.reversalDate){dl.reversalDate=TODAY;dl.reversalInvNo=inv.soHoaDon;}}
  inv.amountDiff=0;invalidateCache();showToast('✅ Đã xác nhận');render(true);
}

// reversalPayments: [{no, amt, date}] — lịch sử từng lần thanh toán (lưu trên mỗi detailLine, amt = phần của dòng đó)
function _getPaymentHistory(ids){
  // Lấy lịch sử payment từ dòng đầu tiên (tất cả dòng cùng nhóm có cùng lịch sử HĐ)
  const first=DB.detailLines.find(d=>d.id===ids[0]);
  if(!first||!first.reversalPayments)return[];
  return first.reversalPayments;
}
function reverseAccrualGroup(ids){
  const first=DB.detailLines.find(d=>d.id===ids[0]);if(!first)return;
  const totalAmt=ids.reduce((s,id)=>{const d=DB.detailLines.find(x=>x.id===id);return s+(d?d.chiPhi:0);},0);
  const alreadyPaid=ids.reduce((s,id)=>{const d=DB.detailLines.find(x=>x.id===id);return s+(d?.reversalAmount||0);},0);
  const remaining=totalAmt-alreadyPaid;
  const isReEntry=alreadyPaid>0;
  const history=_getPaymentHistory(ids);
  const histHtml=history.length?'<div style="margin:6px 0;padding:6px 8px;background:#F3E5F5;border-radius:6px;font-size:11px">'+
    '<strong style="color:#6A1B9A">Lịch sử HĐ đã HN:</strong><br>'+
    history.map((p,i)=>'<span style="display:inline-block;margin:2px 4px 0 0;padding:1px 6px;background:#EDE7F6;border-radius:3px;color:#4A148C">'+(i+1)+'. HĐ '+esc(p.no)+' · '+FMT2(p.groupAmt||p.amt)+' · '+p.date+'</span>').join('')+
    '</div>':'';
  openModal('<div class="modal-t">'+(isReEntry?'➕ Thêm thanh toán (HN 1 phần)':'↩ Hoàn nhập Trích trước')+'</div>'+
    '<div class="ib ib-i"><strong>'+esc(first.chuongTrinh.substring(0,60))+'</strong><br>'+
    (ids.length>1?'<span class="b bb">'+ids.length+' dòng nhóm</span> · ':'')+
    'Tổng trích trước: <strong>'+FMT2(totalAmt)+'</strong>'+(isReEntry?' · Đã HN: <strong style="color:#6A1B9A">'+FMT2(alreadyPaid)+'</strong> · Còn lại: <strong style="color:var(--or)">'+FMT2(remaining)+'</strong>':'')+
    ' · Ngày trích: '+(first.accrualDate||'—')+'</div>'+
    histHtml+
    '<div class="fg"><label class="fl">Số Hóa đơn lần này *</label><input class="fi" id="rev_no" placeholder="Nhập số HĐ"></div>'+
    '<div class="fg"><label class="fl">Số tiền thanh toán lần này *</label>'+
    '<input class="fi" id="rev_amt" type="number" value="'+Math.round(remaining)+'" placeholder="Số tiền HĐ thực tế lần này"></div>'+
    '<div class="modal-f" style="gap:6px"><button class="btn btn-s" onclick="closeModal()">Hủy</button>'+
    '<button class="btn" style="background:#EDE7F6;color:#6A1B9A;border:1px solid #CE93D8" onclick="doReversalGroup('+esc(JSON.stringify(ids))+',false)">🟡 HN 1 phần</button>'+
    '<button class="btn btn-p" onclick="doReversalGroup('+esc(JSON.stringify(ids))+',true)">✅ Kết thúc theo dõi</button></div>');
}
function doReversalGroup(ids,forceEnd){
  const no=document.getElementById('rev_no').value.trim();
  const amtRaw=document.getElementById('rev_amt').value;
  if(!no){alert('Nhập số hóa đơn');return;}
  if(amtRaw===''||isNaN(parseFloat(amtRaw))){alert('Nhập số tiền thực tế');return;}
  const newPayment=parseFloat(amtRaw);
  const grpTotal=ids.reduce((s,id)=>{const d=DB.detailLines.find(x=>x.id===id);return s+(d?d.chiPhi:0);},0)||1;
  const payEntry={no,groupAmt:newPayment,date:TODAY}; // lưu 1 entry dùng chung cho nhóm
  ids.forEach(id=>{
    const dl=DB.detailLines.find(d=>d.id===id);
    if(!dl)return;
    const share=dl.chiPhi/grpTotal;
    dl.reversalAmount=(dl.reversalAmount||0)+newPayment*share;
    dl.reversalDate=TODAY;dl.reversalInvNo=no;dl.soHoaDon=no;
    if(!dl.reversalPayments)dl.reversalPayments=[];
    dl.reversalPayments.push({...payEntry,amt:newPayment*share});
    dl.reversalStatus=(forceEnd||dl.reversalAmount>=dl.chiPhi*0.99)?'full':'partial';
  });
  const totalPaid=ids.reduce((s,id)=>{const d=DB.detailLines.find(x=>x.id===id);return s+(d?.reversalAmount||0);},0);
  invalidateCache();closeModal();
  showToast(forceEnd?'✅ Kết thúc theo dõi · HĐ '+no+' · '+FMT2(totalPaid)+'/'+FMT2(grpTotal):'🟡 HN 1 phần · HĐ '+no+' · '+FMT2(totalPaid)+'/'+FMT2(grpTotal));
  render(true);
}
function reverseAccrual(dlId){reverseAccrualGroup([dlId]);}
function reverseAccrualGroupBtn(btn){
  try{const ids=JSON.parse(btn.dataset.ids);reverseAccrualGroup(ids);}catch(e){alert('Lỗi: '+e.message);}
}

// Import file đã điền: theo ID nhóm (groupId) → set hoàn nhập + số tiền thực tế
function importReversalExcel(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(!rows.length){alert('File rỗng');return;}
        const hdr=rows[0].map(c=>norm(String(c)));
        const idCol=hdr.findIndex(h=>h.includes('id nhom')||h.includes('id nh'));
        const noCol=hdr.findIndex(h=>h.includes('so hd')||h.includes('so hoa don'));
        const amtCol=hdr.findIndex(h=>h.includes('so tien thuc te')||h.includes('thuc te')||h.includes('actual'));
        if(idCol<0||noCol<0||amtCol<0){alert('File phải có cột: "ID nhóm", "Số HĐ hoàn nhập", "Số tiền thực tế" (dùng đúng file đã Export).');return;}
        let done=0;
        // Build map of all pending accruals grouped by groupId
        const pendingLines=DB.detailLines.filter(d=>d.trichTruoc==='N'&&!d.reversalDate);
        const grouped=groupAccruals(pendingLines);
        const groupMap=new Map();
        grouped.forEach(g=>groupMap.set(g.groupId,g));
        for(let i=1;i<rows.length;i++){
          const row=rows[i];if(!row)continue;
          const groupId=String(row[idCol]||'').trim();
          const no=String(row[noCol]||'').trim();
          const amt=parseFloat(String(row[amtCol]).replace(/[^\d.-]/g,''));
          if(!groupId||!no||isNaN(amt))continue;
          const g=groupMap.get(groupId);
          if(!g)continue;
          const grpTotal=g.ids.reduce((s,id)=>{const d=DB.detailLines.find(x=>x.id===id);return s+(d?d.chiPhi:0);},0)||1;
          g.ids.forEach(id=>{
            const dl=DB.detailLines.find(d=>d.id===id);
            if(dl){dl.reversalDate=TODAY;dl.reversalInvNo=no;dl.soHoaDon=no;dl.reversalAmount=amt*(dl.chiPhi/grpTotal);done++;}
          });
        }
        invalidateCache();render(true);
        if(done>0)showToast('✅ Đã hoàn nhập '+done+' dòng từ file import.');
        else alert('Không có dòng nào được hoàn nhập. Kiểm tra ID nhóm + đã điền Số HĐ và Số tiền chưa.');
      }catch(err){alert('Lỗi đọc file: '+err.message);}
    };
    r.readAsArrayBuffer(f);
  };
  inp.click();
}

function showTTTypeMappingModal(wb, buffer){
  const ttSheets=wb.SheetNames.filter(sn=>{const snN=norm(sn);return snN.includes('to trinh')||sn.toLowerCase().includes('tờ trình');});
  if(!ttSheets.length){alert('Không tìm thấy sheet Tờ trình nào trong file.');return;}
  const typeOpts=Object.entries(TT_TYPE).map(([k,v])=>'<option value="'+k+'">'+v.label+'</option>').join('');
  const rows=ttSheets.map((sn,idx)=>{
    const guess=(idx===0?'1-NT':idx===1?'2-VX':idx===2?'3-NT-HANG':idx===3?'4-VX-HANG':'ADHOC');
    return '<tr><td class="f11" style="padding:5px 8px"><strong>'+esc(sn)+'</strong></td><td style="padding:5px 8px"><select class="fs" data-sheet="'+esc(sn)+'" style="width:100%"><option value="">-- Chọn loại --</option>'+typeOpts.replace('value="'+guess+'"','value="'+guess+'" selected')+'</select></td></tr>';
  }).join('');
  window._pendingTTBuffer=buffer;
  openModal('<div class="modal-t">🔗 Xác nhận phân loại Tờ trình</div>'+
    '<div class="ib ib-i">Kiểm tra ánh xạ loại tờ trình cho từng sheet. Mặc định gợi ý theo thứ tự: Tổng, Vaccine, Hãng NTLC, Hãng VX, Adhoc.</div>'+
    '<div style="max-height:50vh;overflow:auto"><table style="width:100%"><thead><tr><th style="text-align:left;padding:5px 8px">Sheet</th><th style="text-align:left;padding:5px 8px">Loại tờ trình</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Hủy</button>'+
    '<button class="btn btn-p" onclick="confirmTTTypeMapping()">✅ Xác nhận & Import</button></div>');
}
function confirmTTTypeMapping(){
  const mapping={};
  let missing=false;
  document.querySelectorAll('#modalArea select[data-sheet]').forEach(sel=>{
    if(!sel.value){missing=true;return;}
    mapping[sel.getAttribute('data-sheet')]=sel.value;
  });
  if(missing){alert('Chọn loại tờ trình cho tất cả sheet');return;}
  window._ttTypeMapping=mapping;
  closeModal();
  runTTImport(window._pendingTTBuffer);
}
function runTTImport(buffer){
  const ev={target:{result:buffer}};
  try{
    const wb=XLSX.read(ev.target.result,{type:'array'});
    let imported=0;const{m,y}=getSelPeriod();
    const catCtrs={TRA:0,DIG:0,SOC:0,PRV:0,HANG:0,ADHOC:0};
    const mapping=window._ttTypeMapping||{};
    wb.SheetNames.forEach((sn,si)=>{
      const snN=norm(sn);
      if(!(snN.includes('to trinh')||sn.toLowerCase().includes('tờ trình')))return;
      const ttType=mapping[sn]||'ADHOC';
      const bu=ttType.includes('VX')?'VX':'NT';
      const ttId='TT'+uid();
      const ttCode='TT-'+String(y).slice(-2)+'-'+MM(m)+'-'+bu+'-'+String(DB.torrTrinh.length+1).padStart(2,'0');
      const ws=wb.Sheets[sn];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const newBCs=[];let curCat='TRA';let hdrRow=-1;let sheetImported=0;
      rows.forEach((r,i)=>{if(r&&r.some(c=>c&&String(c).trim()==='STT'))hdrRow=i;});
      if(hdrRow>=0){
        let ttTotal=0;
        for(let i=hdrRow+1;i<rows.length;i++){
          const r=rows[i];if(!r)continue;
          const first=(r[0]!=null?String(r[0]):'').trim();
          if(/I\.\s*TRADE|TRADE MARKETING/i.test(first))curCat='TRA';
          else if(/II\.\s*DIGITAL/i.test(first))curCat='DIG';
          else if(/III\.\s*SOCIAL/i.test(first))curCat='SOC';
          else if(/IV\.\s*(CHI PHÍ )?DỰ PHÒNG/i.test(first))curCat='PRV';
          const stt=parseInt(r[0]);if(isNaN(stt)||stt<=0||stt>1000)continue;
          let desc='',amt=0;
          if(ttType==='3-NT-HANG'||ttType==='4-VX-HANG'){desc=r[1]?String(r[1]).trim():'';amt=parseFloat(r[3])||0;curCat='HANG';}
          else if(ttType==='ADHOC'){desc=r[1]?String(r[1]).trim():'';amt=parseFloat(r[2])||parseFloat(r[3])||parseFloat(r[4])||0;curCat='ADHOC';}
          else{desc=r[1]?String(r[1]).trim():'';amt=parseFloat(r[4])||parseFloat(r[2])||0;}
          if(!desc||!amt)continue;
          catCtrs[curCat]=(catCtrs[curCat]||0)+1;
          const code=String(y).slice(-2)+'-'+MM(m)+'-'+bu+'-'+curCat+'-'+String(catCtrs[curCat]).padStart(3,'0');
          newBCs.push({id:'BC'+uid(),ttId,budgetCode:code,bu,category:curCat,sttTT:stt,month:+m,year:+y,description:desc.substring(0,100),budgetAmount:amt,usedAmount:0,transferredIn:0,transferredOut:0,status:'active',pic:''});
          ttTotal+=amt;imported++;sheetImported++;
        }
        if(sheetImported>0){
          DB.torrTrinh.push({id:ttId,ttCode,type:ttType,bu,month:+m,year:+y,pic:'',submittedDate:y+'-'+MM(m)+'-01',status:'coded',totalAmount:ttTotal,note:sn});
          DB.budgetCodes.push(...newBCs);
        }
      }
    });
    if(imported>0){invalidateCache();addVersionLog('Import','TT Excel','Import '+imported+' dòng từ '+wb.SheetNames.length+' sheet');render(true);showToast('✅ Import '+imported+' dòng từ '+wb.SheetNames.length+' sheet');}
    else alert('Không tìm thấy dữ liệu. File cần có dòng STT.');
  }catch(err){alert('Lỗi: '+err.message);}
}

// ═══ IMPORT: DETAIL EXCEL (sheet 1-4) ═══════════════════
function norm(s){
  if(!s&&s!==0)return'';
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/đ/g,'d').trim();
}
function findCol(hRow,keywords){
  for(let i=0;i<hRow.length;i++){
    const h=norm(hRow[i]);
    if(keywords.some(k=>h.includes(k)))return i;
  }
  return undefined;
}

function parseSttList(raw){
  if(raw===null||raw===undefined||raw==='')return[];
  if(typeof raw==='number')return[Math.trunc(raw)];
  return String(raw).split(/[,;\/\s]+/).map(s=>s.trim()).filter(s=>/^\d+$/.test(s)).map(s=>parseInt(s,10));
}

// Tính lại usedAmount cho mọi budget code của 1 kỳ, dựa trên detail (chia đều multi-STT).
// QUAN TRỌNG: chỉ cộng detail vào BC CÙNG TỜ TRÌNH (ttId), tránh STT trùng giữa các tờ trình.
function recomputeUsed(m,y){
  const periodBCs=DB.budgetCodes.filter(b=>b.month===+m&&b.year===+y);
  periodBCs.forEach(b=>b.usedAmount=0);
  const bcByTtStt={}; // key = ttId|stt -> bc
  periodBCs.forEach(b=>{if(b.sttTT)bcByTtStt[b.ttId+'|'+b.sttTT]=b;});
  DB.detailLines.forEach(d=>{
    if(d.importMonth!==+m||d.importYear!==+y)return;
    const list=d.hangMucTT&&d.hangMucTT.length?d.hangMucTT:[];
    if(list.length&&d.ttId){
      const share=(d.chiPhi||0)/list.length;
      list.forEach(stt=>{const bc=bcByTtStt[d.ttId+'|'+stt];if(bc)bc.usedAmount+=share;});
    }else if(d.bcId){
      const bc=periodBCs.find(b=>b.id===d.bcId);
      if(bc)bc.usedAmount+=(d.chiPhi||0);
    }
  });
  periodBCs.forEach(b=>{
    const tot=b.budgetAmount+b.transferredIn;
    b.status=b.transferredOut>0&&b.usedAmount===0?'closed':(b.usedAmount>tot+1?'over':(Math.abs(b.usedAmount-tot)<=1?'used':'active'));
  });
}

let detailSheetMapping=null;
function importDetailExcel(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{

      const buffer=ev.target.result;
      let wb;
      try{wb=XLSX.read(buffer,{type:'array'});}catch(err){alert('Lỗi đọc file: '+err.message);return;}
      // Bước phân loại thủ công: gán mỗi sheet detail vào đúng tờ trình trước khi xử lý
      showDetailMappingModal(wb,buffer);
    };
    reader.readAsArrayBuffer(f);
  };
  inp.click();
}

function showDetailMappingModal(wb,buffer){
  const{m,y}=getSelPeriod();

  if(!periodTTs.length){alert('Chưa có tờ trình nào cho kỳ '+MM(m)+'/'+y+'.\nVào tab "Tờ trình & Mã NS" → Import TT Excel trước.');return;}
  const detailSheets=wb.SheetNames.filter(n=>{const nn=norm(n);return !(nn.includes('to trinh')||n.toLowerCase().includes('tờ trình'));});
  const ttOptions=tt=>periodTTs.map((t,i)=>'<option value="'+t.id+'">'+(t.ttCode||('TT'+(i+1)))+' · '+ttShortLabel(t.id)+(t.note?' ('+t.note.substring(0,24)+')':'')+'</option>').join('');
  window._pendingDetailBuffer=buffer;
  const rows=detailSheets.map((sn,i)=>{
    const guess=periodTTs[i]?periodTTs[i].id:'';
    const sel='<select class="fs" style="width:100%" data-sheet="'+esc(sn)+'">'+
      periodTTs.map((t,j)=>'<option value="'+t.id+'" '+(t.id===guess?'selected':'')+'>'+(t.ttCode||('TT'+(j+1)))+' · '+ttShortLabel(t.id)+(t.note?' ('+t.note.substring(0,22)+')':'')+'</option>').join('')+
      '<option value="__skip__">— Bỏ qua sheet này —</option>'+

    return '<tr><td class="f11" style="padding:5px 8px"><strong>'+esc(sn)+'</strong></td><td style="padding:5px 8px">'+sel+'</td></tr>';
  }).join('');
  openModal('<div class="modal-t">🔗 Gán sheet Detail → Tờ trình</div>'+
    '<div class="ib ib-i">Kiểm tra ánh xạ tự động (theo thứ tự) và chỉnh nếu cần, để tránh dữ liệu bị gán nhầm tờ trình. Mỗi sheet detail thuộc về 1 tờ trình.</div>'+
    '<div style="max-height:50vh;overflow:auto"><table style="width:100%"><thead><tr><th style="text-align:left;padding:5px 8px">Sheet trong file</th><th style="text-align:left;padding:5px 8px">Thuộc tờ trình</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Hủy</button>'+
    '<button class="btn btn-p" onclick="confirmDetailMapping()">✅ Xử lý import</button></div>');
}
function confirmDetailMapping(){
  const mapping={};
  document.querySelectorAll('[data-sheet]').forEach(sel=>{mapping[sel.getAttribute('data-sheet')]=sel.value;});
  detailSheetMapping=mapping;
  const buffer=window._pendingDetailBuffer;
  closeModal();
  runDetailImport(buffer);
}

function runDetailImport(buffer){
  const ev={target:{result:buffer}};
    {
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        let total=0,mapped=0,shared=0;
        const{m,y}=getSelPeriod();
        const periodBCs=filterByPeriod(DB.budgetCodes,m,y);
        const sheetLog=[];

        // Xóa detail cũ của kỳ này trước khi import bản mới (tránh trùng khi MKT gửi lại)
        const before=DB.detailLines.length;
        DB.detailLines=DB.detailLines.filter(d=>!(d.importMonth===+m&&d.importYear===+y));
        const removedOld=before-DB.detailLines.length;

        // Ghép cặp sheet detail ↔ tờ trình theo THỨ TỰ: detail sheet thứ k ứng với tờ trình thứ k.
        // Danh sách tờ trình cùng kỳ, theo đúng thứ tự đã import.
        const periodTTs=DB.torrTrinh.filter(t=>t.month===+m&&t.year===+y);
        const detailSheetNames=wb.SheetNames.filter(n=>{const nn=norm(n);return !(nn.includes('to trinh')||n.toLowerCase().includes('tờ trình'));});
        let detailSheetIdx=-1;

        wb.SheetNames.forEach((sn,si)=>{
          const ws=wb.Sheets[sn];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
          if(!rows||rows.length<2){sheetLog.push(sn+': bỏ qua');return;}
          const snNorm=norm(sn);
          // chỉ xử lý sheet detail (bỏ qua sheet tờ trình)
          if(snNorm.includes('to trinh')||snNorm.includes('tờ trình')){return;}
          detailSheetIdx++;
          // Ưu tiên ánh xạ thủ công người dùng đã chọn; nếu không có thì ghép theo thứ tự
          if(detailSheetMapping&&detailSheetMapping[sn]==='__skip__'){sheetLog.push(sn+': bỏ qua (người dùng chọn)');return;}
          const pairedTtId=(detailSheetMapping&&detailSheetMapping[sn]!==undefined&&detailSheetMapping[sn]!=='')
            ? detailSheetMapping[sn]
            : (periodTTs[detailSheetIdx]?periodTTs[detailSheetIdx].id:'');

          let isVX=snNorm.includes('vaccine')||snNorm.includes('vac')||snNorm.includes('tttc')||snNorm.includes(' vx');
          let isHang=snNorm.includes('hang')||snNorm.includes('partner')||snNorm.includes('monthly');
          const sheetBU=isVX?'VX':'NT';

          const SCORE_KEYS=['chi phi','chi phí','chuong trinh','ma shop','trich truoc','hang muc'];
          let hdr=-1;
          for(let i=0;i<Math.min(rows.length,20);i++){
            const r=rows[i];if(!r||!Array.isArray(r))continue;
            const score=r.filter(c=>c&&SCORE_KEYS.some(k=>norm(String(c)).includes(k))).length;
            const hasChiPhi=r.some(c=>c&&norm(String(c)).includes('chi phi'));
            const hasCT=r.some(c=>c&&norm(String(c)).includes('chuong trinh'));
            // header thật phải có cả "chi phí" và "chương trình" (tránh chọn nhầm dòng ghi chú phía trên)
            if(score>=3&&hasChiPhi&&hasCT){hdr=i;break;}
          }
          if(hdr<0){sheetLog.push(sn+': không tìm được header (cần có cột Chi phí + Chương trình)');return;}

          const hRow=rows[hdr];
          const ci={};
          ci.pic    =findCol(hRow,['nguoi phu trach','pic','npt']);
          ci.maShop =findCol(hRow,['ma shop']);
          ci.chiPhi =findCol(hRow,['chi phi','so tien','amount']);
          ci.ct     =findCol(hRow,['chuong trinh','mo ta','noi dung','dien giai']);
          ci.tt     =findCol(hRow,['trich truoc','co hoa don']);
          ci.soHD   =findCol(hRow,['so hoa don','so hd']);
          ci.mst    =findCol(hRow,['mst','ma so thue','tax']);
          ci.tenShop=findCol(hRow,['ten shop','ten cua hang']);
          ci.nhom   =findCol(hRow,['nhom','group']);
          ci.ncc    =findCol(hRow,['nha cung cap','ncc','vendor']);
          ci.hangMuc=findCol(hRow,['hang muc theo','hang muc to trinh','hang muc']);

          if(ci.chiPhi===undefined||ci.ct===undefined){sheetLog.push(sn+': thiếu cột Chi phí/Chương trình');return;}

          let sheetCount=0;
          for(let i=hdr+1;i<rows.length;i++){
            const row=rows[i];
            if(!row||!Array.isArray(row))continue;
            if(row.every(c=>c===''||c===null||c===undefined))continue;

            const chiPhi=parseFloat(String(row[ci.chiPhi]).replace(/[^\d.-]/g,''))||0;
            const ct=ci.ct!=null&&row[ci.ct]?String(row[ci.ct]).trim():'';
            if(!chiPhi||!ct||ct.length<2)continue;

            const ttRaw=ci.tt!=null&&row[ci.tt]?String(row[ci.tt]).trim().toUpperCase():'';
            const trich=ttRaw==='Y'||ttRaw==='CÓ'||ttRaw==='CO'?'Y':ttRaw==='NK'?'NK':'N';
            const soHDRaw=ci.soHD!=null&&row[ci.soHD]?String(row[ci.soHD]).trim():'';
            const soHD=soHDRaw&&!/chua|chưa|pending|n\/a/i.test(soHDRaw)?soHDRaw:'';
            const mst=ci.mst!=null&&row[ci.mst]?String(row[ci.mst]).trim():'';
            const tenShop=ci.tenShop!=null&&row[ci.tenShop]?String(row[ci.tenShop]).trim():'';
            const nhom=ci.nhom!=null&&row[ci.nhom]?String(row[ci.nhom]).trim():'';
            const ncc=ci.ncc!=null&&row[ci.ncc]?String(row[ci.ncc]).trim():'';
            const maShop=ci.maShop!=null&&row[ci.maShop]?(parseFloat(row[ci.maShop])||row[ci.maShop]):0;
            const pic=ci.pic!=null&&row[ci.pic]?String(row[ci.pic]).trim():'';
            const hangMucTT=ci.hangMuc!=null?parseSttList(row[ci.hangMuc]):[];
            const isShared=hangMucTT.length>1;
            if(isShared)shared++;

            // gán BC chính theo STT đầu tiên TRONG CÙNG tờ trình (để hiển thị); used tính lại bằng recomputeUsed
            let bcId='';
            if(hangMucTT.length&&pairedTtId){
              const bc=periodBCs.find(b=>b.ttId===pairedTtId&&b.sttTT===hangMucTT[0]);
              if(bc)bcId=bc.id;
            }
            if(bcId)mapped++;

            DB.detailLines.push({
              id:'DL'+uid(),bcId,ttId:pairedTtId,pic,maShop,chiPhi,chuongTrinh:ct,trichTruoc:trich,
              soHoaDon:soHD,kyHieu:'',maSoThueNCC:mst,nhaCungCap:ncc,tenShop,nhom,bu:sheetBU,
              hangMucTT,isShared,
              importMonth:+m,importYear:+y,
              matchedInvoice:'',matchAmountOk:false,
              accrualDate:trich==='N'?y+'-'+MM(m)+'-31':'',
              reversalDate:'',reversalInvNo:''
            });
            total++;sheetCount++;
          }
          sheetLog.push(sn+' ['+sheetBU+(isHang?'-Hãng':'')+'] → '+sheetCount+' dòng');
        });

        if(total>0){
          recomputeUsed(m,y);
          invalidateCache();
          // tự động phát hiện thay đổi so với lần import trước của kỳ này
          detectDetailChanges(+m,+y,DB.detailLines.filter(d=>d.importMonth===+m&&d.importYear===+y));
          render(true);
          showToast('✅ Import '+total+' dòng · '+mapped+' gán theo STT · '+shared+' dòng dùng chung nhiều STT'+(removedOld?' · đã thay '+removedOld+' dòng cũ':''));
        }else{
          alert('Không tìm thấy dữ liệu hợp lệ.\n\nLog:\n'+sheetLog.join('\n'));
        }
      }catch(err){
        alert('Lỗi đọc file: '+err.message);
      }
    }
}

// ═══ IMPORT: INVOICE EXCEL ═══════════════════════════════
function importInvExcel(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      // raw:true để lấy giá trị số thô, tránh formatted string làm mất 3 số 0
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
      if(!rows||rows.length<2){alert('File trống');return;}
      let hdrIdx=0;
      for(let i=0;i<Math.min(rows.length,5);i++){
        if(rows[i].some(c=>c&&/(hoa don|invoice|mst|thue)/i.test(norm(String(c))))){hdrIdx=i;break;}
      }
      const hRow=rows[hdrIdx];
      const ci={};
      hRow.forEach((h,i)=>{
        const hn=norm(String(h||''));
        if(/so hoa don|so hd|invoice no/.test(hn))ci.soHD=i;
        if(/ky hieu|serial|mau so/.test(hn))ci.kyHieu=i;
        if(/ngay lap|ngay hoa don/.test(hn))ci.ngay=i;
        if(/ten nguoi ban|ten ncc|supplier|vendor/.test(hn))ci.ten=i;
        // Ưu tiên MST người bán (seller), nếu không có thì fallback người mua hoặc chung
        if(/ma so thue nguoi ban|mst nguoi ban|mst ben ban|mst seller|tax code seller/.test(hn))ci.mstSeller=i;
        else if(/ma so thue nguoi mua|mst nguoi mua|mst ben mua|mst buyer|tax code buyer/.test(hn))ci.mstBuyer=i;
        else if(/ma so thue|mst|tax code/.test(hn))ci.mst=i;
        if(/tien truoc thue|truoc thue|net amount|pre.?tax|chua thue|chua vat/.test(hn))ci.truocThue=i;
        if(/tien thue|^thue$|thue gtgt|vat amount/.test(hn))ci.thue=i;
        if(/tong tien|thanh tien|tong cong|total/.test(hn))ci.tong=i;
        if(/danh muc|dien giai|mo ta|description|noi dung/.test(hn))ci.desc=i;
      });
      // Resolve MST: người bán > người mua > chung
      if(ci.mstSeller!==undefined)ci.mst=ci.mstSeller;
      else if(ci.mstBuyer!==undefined)ci.mst=ci.mstBuyer;
      // Parse số: ưu tiên raw number, fallback string
      const parseNum=v=>{
        if(typeof v==='number')return v;
        if(!v&&v!==0)return 0;
        const s=String(v).replace(/[^\d.,-]/g,'');if(!s)return 0;
        const lc=s.lastIndexOf(','),ld=s.lastIndexOf('.');
        // Nếu có cả 2 dấu: dấu đầu tiên từ phải sang là phân cách hàng nghìn
        if(lc>=0&&ld>=0){
          if(lc>ld)return parseFloat(s.replace(/\./g,'').replace(',','.'))||0; // châu Âu: 1.000,50
          return parseFloat(s.replace(/,/g,''))||0; // US: 1,000.50
        }
        // Chỉ có 1 loại dấu
        if(lc>=0&&ld<0){
          // Chỉ có phẩy: nếu sau phẩy đúng 3 chữ số và không có phần còn lại thì đó là hàng nghìn (VN/US)
          const parts=s.split(',');
          if(parts.length===2&&parts[1].length===3)return parseFloat(parts[0]+parts[1])||0;
          return parseFloat(s.replace(/,/g,''))||0; // có thể là thập phân hoặc hàng nghìn nhiều lần
        }
        if(ld>=0&&lc<0){
          const parts=s.split('.');
          if(parts.length===2&&parts[1].length===3)return parseFloat(parts[0]+parts[1])||0;
          return parseFloat(s.replace(/\./g,''))||0;
        }
        return parseFloat(s)||0;
      };
      // Parse ngày: raw=true có thể trả Date object hoặc Excel serial number
      const parseDateCell=v=>{
        if(v instanceof Date)return v.toISOString().split('T')[0];
        if(typeof v==='number'){
          // Excel serial date: số ngày từ 1899-12-30
          const d=new Date((v-25569)*86400*1000);
          return d.toISOString().split('T')[0];
        }
        return String(v||'').trim();
      };
      // Chuẩn hóa MST và Số HĐ để tránh lệch do dấu chấm, dấu cách, chữ hoa/thường
      const cleanMST=v=>String(v||'').replace(/[.\s\-]/g,'').trim();
      const cleanSHD=v=>String(v||'').trim();
      let cnt=0,dup=0;
      for(let i=hdrIdx+1;i<rows.length;i++){
        const r=rows[i];
        if(!r||r.every(c=>c===''||c===null||c===undefined))continue;
        const soHD=ci.soHD!=null&&r[ci.soHD]?cleanSHD(r[ci.soHD]):'';if(!soHD)continue;
        const mst=ci.mst!=null&&r[ci.mst]?cleanMST(r[ci.mst]):'';
        const kyHieu=ci.kyHieu!=null&&r[ci.kyHieu]?String(r[ci.kyHieu]).trim().toUpperCase():'';
        if(DB.invoices.find(x=>cleanSHD(x.soHoaDon)===soHD&&cleanMST(x.maSoThue)===mst)){dup++;continue;}
        const tongTien=ci.tong!=null?parseNum(r[ci.tong]):0;
        const thue=ci.thue!=null?parseNum(r[ci.thue]):0;
        const truocThue=ci.truocThue!=null?parseNum(r[ci.truocThue]):(tongTien>0&&thue>0?tongTien-thue:tongTien);
        DB.invoices.push({
          id:'I'+uid(),soHoaDon:soHD,kyHieu,
          ngayLap:ci.ngay!=null?parseDateCell(r[ci.ngay]):'',
          tenNCC:ci.ten!=null&&r[ci.ten]?String(r[ci.ten]).trim():'',
          maSoThue:mst,truocThue,thue,tongTien,
          danhMuc:ci.desc!=null&&r[ci.desc]?String(r[ci.desc]).trim().substring(0,100):'',
          matched:false,matchedDLId:'',amountDiff:0
        });
        cnt++;
      }
      if(cnt>0){invalidateCache();autoMatchAll();showToast('✅ Import '+cnt+' HĐ'+(dup?' · '+dup+' trùng bỏ qua':'')+' và auto-match!');}
      else alert('Không có HĐ mới.'+(dup?' ('+dup+' đã có trong hệ thống)':''));
    }catch(err){alert('Lỗi đọc file HĐ: '+err.message);}};
    reader.readAsArrayBuffer(f);
  };inp.click();
}

function doAddPayment(){
  const bcId=document.getElementById('pmt_bc').value;
  const vendor=document.getElementById('pmt_v').value.trim();
  const amount=parseFloat(document.getElementById('pmt_a').value)||0;
  if(!bcId||!vendor||!amount){alert('Thiếu thông tin bắt buộc (BC, NCC, Số tiền)');return;}
  const invId=document.getElementById('pmt_i').value;
  const inv=invId?DB.invoices.find(i=>i.id===invId):null;
  const dlId=inv?.matchedDLId||'';
  DB.payments.push({
    id:'PMT'+uid(),bcId,dlId,invId,
    vendor,mst:document.getElementById('pmt_m').value.trim(),
    amount,requestDate:document.getElementById('pmt_rd').value,
    paidDate:'',status:document.getElementById('pmt_s').value,
    note:document.getElementById('pmt_n').value.trim()
  });
  // Update budget code usedAmount if status is paid
  if(document.getElementById('pmt_s').value==='paid'){
    const bc=DB.budgetCodes.find(b=>b.id===bcId);
    if(bc)bc.usedAmount+=amount;
  }
  invalidateCache();closeModal();showToast('✅ Đã thêm yêu cầu TT');render(true);
}
function markPaid(pmtId){
  const p=DB.payments.find(x=>x.id===pmtId);if(!p)return;
  if(!confirm('Xác nhận đã thanh toán '+FMT2(p.amount)+'?'))return;
  const wasPaid=p.status==='paid';
  p.status='paid';p.paidDate=TODAY;
  if(!wasPaid){const bc=DB.budgetCodes.find(b=>b.id===p.bcId);if(bc)bc.usedAmount+=p.amount;}
  invalidateCache();showToast('✅ Đã đánh dấu Thanh toán');render(true);
}
function deletePmt(pmtId){
  const p=DB.payments.find(x=>x.id===pmtId);if(!p)return;
  if(!confirm('Xóa yêu cầu TT '+pmtId+'?'))return;
  if(p.status==='paid'){const bc=DB.budgetCodes.find(b=>b.id===p.bcId);if(bc)bc.usedAmount=Math.max(0,bc.usedAmount-p.amount);}
  DB.payments=DB.payments.filter(x=>x.id!==pmtId);
  invalidateCache();showToast('✅ Đã xóa');render(true);
}

function renderOutstanding(m,y){
  const periodBCs=m?filterByPeriod(DB.budgetCodes,m,y):DB.budgetCodes;
  const now=new Date();

  // 1. Trích trước quá hạn (>30 ngày)
  const overdueAcc=DB.detailLines.filter(d=>{
    if(d.trichTruoc!=='N'||d.reversalDate)return false;
    const bc=DB.budgetCodes.find(b=>b.id===d.bcId);
    if(!bc)return false;
    if(m&&(bc.month!==m||bc.year!==y))return false;
    const days=d.accrualDate?Math.floor((now-new Date(d.accrualDate))/864e5):0;
    return days>30;
  });

  // 2. HĐ chưa khớp
  const unmatchedInvs=DB.invoices.filter(i=>!i.matched);

  // 3. Budget code vượt NS
  const overBCs=periodBCs.filter(b=>b.usedAmount>b.budgetAmount+b.transferredIn);

  // 4. Điều chuyển chờ duyệt
  const pendTr=DB.transfers.filter(t=>t.status==='pending');

  // 5. Hãng chưa xuất HĐ AR
  const pendHang=DB.hangTracking.filter(h=>{
    const bc=DB.budgetCodes.find(b=>b.id===h.bcId);
    if(!bc)return false;
    if(m&&(bc.month!==m||bc.year!==y))return false;
    return h.arStatus==='pending';
  });

  // 6. Thanh toán chờ (pending > 7 ngày)
  const stalePmts=DB.payments.filter(p=>{
    if(p.status!=='pending')return false;
    const bc=DB.budgetCodes.find(b=>b.id===p.bcId);
    if(!bc)return false;
    if(m&&(bc.month!==m||bc.year!==y))return false;
    const days=p.requestDate?Math.floor((now-new Date(p.requestDate))/864e5):0;
    return days>7;
  });

  const accRows=overdueAcc.map(d=>{
    const bc=DB.budgetCodes.find(b=>b.id===d.bcId)||{};
    const days=d.accrualDate?Math.floor((now-new Date(d.accrualDate))/864e5):0;
    return '<tr style="background:'+(days>45?'#FFF3E0':'#FFFDE7')+'">'+
      '<td style="padding-left:12px"><span class="b '+(days>45?'br':'by')+'">'+(days>45?'🔴 >45ng':'🟡 >30ng')+'</span></td>'+
      '<td><span class="code" style="font-size:10px">'+(bc.budgetCode||'?')+'</span></td>'+
      '<td class="f11">'+d.chuongTrinh.substring(0,35)+'</td>'+
      '<td class="f11 cm">'+(d.maSoThueNCC||'—')+'</td>'+
      '<td class="tr fw6 re">'+FMT(d.chiPhi)+'</td>'+
      '<td class="f11 cm">'+days+' ngày</td>'+
      '<td><button class="btn btn-g btn-xs" onclick="reverseAccrual(\''+d.id+'\')">↩ Hoàn nhập</button></td></tr>';
  }).join('');

  const invRows=unmatchedInvs.slice(0,20).map(i=>'<tr>'+
    '<td style="padding-left:12px"><span class="code">'+i.soHoaDon+'</span></td>'+
    '<td class="f11">'+i.tenNCC.substring(0,25)+'</td>'+
    '<td class="f11 cm">'+i.maSoThue+'</td>'+
    '<td class="f11 cm">'+i.ngayLap+'</td>'+
    '<td class="tr fw6">'+FMT(i.tongTien)+'</td>'+
    '<td><button class="btn btn-s btn-xs" onclick="manualMatchInv(\''+i.id+'\')">🔗 Khớp</button></td></tr>').join('');

  const overRows=overBCs.map(b=>{const ov=b.usedAmount-(b.budgetAmount+b.transferredIn);return '<tr style="background:#FFEBEE">'+
    '<td style="padding-left:12px"><span class="code">'+b.budgetCode+'</span></td>'+
    '<td class="f11">'+b.description.substring(0,35)+'</td>'+
    '<td class="tr">'+FMT(b.budgetAmount+b.transferredIn)+'</td>'+
    '<td class="tr fw6 re">'+FMT(b.usedAmount)+'</td>'+
    '<td class="tr re fw6">+'+FMT(ov)+'</td></tr>';}).join('');

  const hangRows=pendHang.map(h=>{const bc=DB.budgetCodes.find(b=>b.id===h.bcId)||{};return '<tr>'+
    '<td style="padding-left:12px"><span class="code">'+(bc.budgetCode||'?')+'</span></td>'+
    '<td class="f11">'+h.hangName+'</td>'+

// ═══ PAGE: LỊCH SỬ THAY ĐỔI ════════════════════════════════
// ═══ PHÁT HIỆN THAY ĐỔI DETAIL KHI UP FILE MỚI ═══════════
function detailKey(d){
  // khóa nhận diện 1 NHÓM detail (không có ID cố định trong file MKT):
  // Mã shop + Chương trình + NCC + STT hạng mục
  return [d.maShop,String(d.chuongTrinh||'').trim().toLowerCase(),String(d.nhaCungCap||'').trim().toLowerCase(),(d.hangMucTT||[]).join(',')].join('||');
}
// Gom các dòng detail theo khóa thành nhóm: tổng tiền + số dòng + thông tin hiển thị
function groupDetailSnap(lines){
  const map=new Map();
  lines.forEach(d=>{
    const k=detailKey(d);
    if(!map.has(k)){
      map.set(k,{key:k,totalChiPhi:0,count:0,trichTruoc:d.trichTruoc,
        chuongTrinh:d.chuongTrinh,nhaCungCap:d.nhaCungCap,hangMucTT:d.hangMucTT,maShop:d.maShop});
    }
    const g=map.get(k);
    g.totalChiPhi+=(d.chiPhi||0);
    g.count++;
  });
  return Array.from(map.values());
}
function detectDetailChanges(m,y,newLines){
  const pk=y+'-'+MM(m);
  const oldSnap=DB.detailSnapshots[pk]||null;
  const newSnap=groupDetailSnap(newLines);
  if(oldSnap){
    const oldMap=new Map(oldSnap.map(r=>[r.key,r]));
    const newMap=new Map(newSnap.map(r=>[r.key,r]));
    const changes={added:[],removed:[],modified:[],ts:new Date().toLocaleString('vi-VN')};
    newSnap.forEach(r=>{
      const o=oldMap.get(r.key);
      if(!o)changes.added.push(r);
      else{
        // chỉ coi là SỬA khi tổng tiền nhóm đổi >1đ, hoặc số dòng đổi, hoặc trích trước đổi
        const amtChanged=Math.abs((o.totalChiPhi||0)-(r.totalChiPhi||0))>1;
        const cntChanged=(o.count||0)!==(r.count||0);
        const ttChanged=o.trichTruoc!==r.trichTruoc;
        if(amtChanged||cntChanged||ttChanged){
          changes.modified.push({...r,oldChiPhi:o.totalChiPhi,oldCount:o.count,oldTrich:o.trichTruoc});
        }
      }
    });
    oldSnap.forEach(r=>{if(!newMap.has(r.key))changes.removed.push(r);});
    DB.detailChanges[pk]=changes;
  }
  DB.detailSnapshots[pk]=newSnap;
}

function renderVersion(m,y){
  const pk=y+'-'+MM(m);
  const ch=DB.detailChanges[pk];
  const hasSnap=!!DB.detailSnapshots[pk];
  let body;
  if(!hasSnap){
    body='<div class="ib ib-w">Kỳ '+MM(m)+'/'+y+' chưa có dữ liệu detail nào được import. Vào tab <strong>Detail Chi phí</strong> → <strong>⬆ Import Excel</strong> để nạp file MKT lần đầu.</div>';
  }else if(!ch){
    body='<div class="ib ib-i">Đã có dữ liệu detail kỳ '+MM(m)+'/'+y+' (bản đầu tiên). Khi MKT gửi file cập nhật và bạn import lại cùng kỳ này, các thay đổi <strong>Thêm / Xóa / Sửa số tiền / Sửa trích trước</strong> sẽ tự động hiện ở đây.</div>';
  }else{
    const sumImpact=ch.added.reduce((s,r)=>s+(r.totalChiPhi||0),0)-ch.removed.reduce((s,r)=>s+(r.totalChiPhi||0),0)+ch.modified.reduce((s,r)=>s+((r.totalChiPhi||0)-(r.oldChiPhi||0)),0);
    const card=(label,n,color)=>'<div class="card" style="text-align:center"><div class="cb"><div style="font-size:22px;font-weight:700;color:'+color+'">'+n+'</div><div class="f11 cm">'+label+'</div></div></div>';
    const rowAdd=ch.added.map(r=>'<tr style="background:#E8F5E9"><td class="f11"><span class="tag" style="background:#1E7E34;color:#fff">THÊM</span></td><td class="f11">'+esc(r.chuongTrinh)+'</td><td class="f11">'+esc(r.nhaCungCap)+'</td><td class="f11 cm">'+(r.hangMucTT||[]).join(',')+'</td><td class="f11 cm" style="text-align:center">'+r.count+'</td><td class="f11 cm" style="text-align:right">+'+FMT2(r.totalChiPhi)+'</td><td class="f11 cm">'+esc(r.trichTruoc)+'</td></tr>').join('');
    const rowRem=ch.removed.map(r=>'<tr style="background:#FDECEA"><td class="f11"><span class="tag" style="background:#B3261E;color:#fff">XÓA</span></td><td class="f11">'+esc(r.chuongTrinh)+'</td><td class="f11">'+esc(r.nhaCungCap)+'</td><td class="f11 cm">'+(r.hangMucTT||[]).join(',')+'</td><td class="f11 cm" style="text-align:center">'+r.count+'</td><td class="f11 cm" style="text-align:right">-'+FMT2(r.totalChiPhi)+'</td><td class="f11 cm">'+esc(r.trichTruoc)+'</td></tr>').join('');
    const rowMod=ch.modified.map(r=>{
      const diff=(r.totalChiPhi||0)-(r.oldChiPhi||0);
      const ttChg=r.oldTrich!==r.trichTruoc?(' · TT '+r.oldTrich+'→'+r.trichTruoc):'';
      const cntChg=(r.oldCount!==r.count)?(' · '+r.oldCount+'→'+r.count+' dòng'):'';
      return '<tr style="background:#FFF6E0"><td class="f11"><span class="tag" style="background:#92660C;color:#fff">SỬA</span></td><td class="f11">'+esc(r.chuongTrinh)+'</td><td class="f11">'+esc(r.nhaCungCap)+'</td><td class="f11 cm">'+(r.hangMucTT||[]).join(',')+'</td><td class="f11 cm" style="text-align:center">'+r.count+'</td><td class="f11 cm" style="text-align:right">'+FMT2(r.oldChiPhi)+' → '+FMT2(r.totalChiPhi)+(diff?' ('+(diff>0?'+':'')+FMT2(diff)+')':'')+'</td><td class="f11 cm">'+esc(r.trichTruoc)+ttChg+cntChg+'</td></tr>';
    }).join('');
    const allRows=rowAdd+rowMod+rowRem;
    body=
      '<div class="ib ib-i">So sánh lần import gần nhất với lần trước đó của kỳ '+MM(m)+'/'+y+' · cập nhật lúc '+ch.ts+' · <strong>gom theo nhóm</strong> (Mã shop + Chương trình + NCC + STT)</div>'+
      '<div class="g4" style="margin-bottom:12px">'+
      card('Nhóm THÊM mới',ch.added.length,'#1E7E34')+
      card('Nhóm bị XÓA',ch.removed.length,'#B3261E')+
      card('Nhóm bị SỬA',ch.modified.length,'#92660C')+
      '<div class="card" style="text-align:center"><div class="cb"><div style="font-size:18px;font-weight:700;color:'+(sumImpact>=0?'#1E7E34':'#B3261E')+'">'+(sumImpact>=0?'+':'')+FMT2(sumImpact)+'</div><div class="f11 cm">Ảnh hưởng tổng chi phí</div></div></div>'+
      '</div>'+
      '<div class="card"><div class="ch"><span class="ct">Chi tiết thay đổi ('+(ch.added.length+ch.removed.length+ch.modified.length)+' nhóm)</span></div>'+
      '<div class="cb" style="padding:0"><table><thead><tr><th style="padding-left:12px">Loại</th><th>Chương trình</th><th>Nhà cung cấp</th><th>STT</th><th style="text-align:center">Số dòng</th><th style="text-align:right">Tổng tiền</th><th>Trích trước</th></tr></thead>'+
      '<tbody>'+(allRows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#888">Không có thay đổi nào giữa 2 lần import.</td></tr>')+'</tbody></table></div></div>';
  }
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<h3 style="font-size:14px;font-weight:700;color:#1A1D2E">🔍 Thay đổi Detail khi up file mới — '+MM(m)+'/'+y+'</h3>'+
    (DB.detailChanges[pk]?'<button class="btn btn-r btn-sm" onclick="if(confirm(\'Xóa lịch sử thay đổi của kỳ này?\')){delete DB.detailChanges[\''+pk+'\'];render(true);}">🗑 Xóa</button>':'')+
    '</div>'+body;
}
function esc(s){return(s===null||s===undefined)?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ═══ BIND EVENTS ═════════════════════════════════════════
function bindEvents(){
  // Fix Vietnamese IME for filter inputs
  fixViInput('detQ', v=>{detailFilter.q=v;renderDetailPage();});
  fixViInput('invQ', v=>{invFilter.q=v;renderInvoicePage();});
  fixViInput('accQ', v=>{accrualFilter.q=v;render(true);});
  document.querySelectorAll('.dl-chk').forEach(chk=>{
    chk.addEventListener('change',()=>{
      if(chk.checked)selectedDLs.add(chk.dataset.id);else selectedDLs.delete(chk.dataset.id);
      const btn=document.getElementById('btnDelSel');if(btn)btn.style.display=selectedDLs.size>0?'inline-flex':'none';
    });
  });
  document.querySelectorAll('.bc-surplus-chk').forEach(chk=>{
    chk.addEventListener('change',()=>{
      const sel=document.querySelectorAll('.bc-surplus-chk:checked');
      const total=Array.from(sel).reduce((s,c)=>s+parseFloat(c.dataset.rem||0),0);
      const info=document.getElementById('selSurplusInfo');
      if(info)info.textContent=sel.length?sel.length+' codes · '+FMT(total):'';
    });
  });
  // accMoSel / hangMoSel removed — month selection now via button-group (buildMonthPicker)
  if(curPage!=='detail')selectedDLs.clear();
}

// ═══ VIETNAMESE IME FIX ══════════════════════════════════
function fixViInput(inputId, onChangeFn){
  const el=document.getElementById(inputId);
  if(!el||el._imeBound)return;
  el._imeBound=true;
  let composing=false;
  el.addEventListener('compositionstart',()=>{composing=true;});
  el.addEventListener('compositionend',()=>{composing=false;onChangeFn(el.value);});
  el.addEventListener('input',()=>{if(!composing)onChangeFn(el.value);});
}

// ═══ INIT ════════════════════════════════════════════════
(async()=>{
  let loaded=false;
  try{
    const raw=await idbLoad();
    if(raw){
      Object.assign(DB,JSON.parse(raw));
      migrateDB();
      if(!DB.torrTrinh?.length)initSampleData();
      loaded=true;
    }
  }catch(e){console.warn('IDB load failed, fallback localStorage',e);}
  // fallback: nếu IDB trống thì thử localStorage cũ (migrate 1 lần)
  if(!loaded){
    const lsSaved=localStorage.getItem(LS);
    if(lsSaved){
      try{Object.assign(DB,JSON.parse(lsSaved));migrateDB();if(!DB.torrTrinh?.length)initSampleData();
        // tự động migrate localStorage → IndexedDB
        await idbSave(lsSaved);
        localStorage.removeItem(LS);
        showToast('✅ Đã migrate data từ localStorage → IndexedDB');
      }catch(e){initSampleData();}
    } else initSampleData();
  }
  render(true);
  updateSbInfo();
  bgLoadCloud(); // load cloud ngầm sau khi IDB đã hiển thị
})();
</script>
